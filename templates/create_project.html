<!-- templates/create_project.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            margin: 0;
        }

        /* TOPBAR */
        .topbar {
            background: linear-gradient(90deg, #4a90d9, #6a5acd);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        /* CENTER CONTAINER */
        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
            color: #333;
        }

        label {
            font-size: 13px;
            color: #555;
            margin-top: 10px;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #6a5acd;
            outline: none;
            box-shadow: 0 0 0 2px rgba(106,90,205,0.1);
        }

        textarea {
            resize: none;
            height: 100px;
        }

        /* BUTTONS */
        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #4a90d9, #6a5acd);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #6a5acd;
            font-size: 13px;
        }

        .back:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <span>Create Project</span>
    <a href="/admin">⬅ Back to Dashboard</a>
</div>

<!-- FORM -->
<div class="container">
    <div class="card">

        <h2>New Project</h2>

        <form action="/create_project" method="POST">

            <label>Project Name</label>
            <input type="text" name="name" placeholder="Enter project name" required>

            <label>Description</label>
            <textarea name="description" placeholder="Enter project description"></textarea>

            <button class="btn">Create Project</button>

        </form>

        <a href="/admin" class="back">⬅ Go Back</a>

    </div>
</div>

</body>
</html>
